name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

# 必须添加写入权限，否则 GitHub Actions 无法创建 Release
permissions:
  contents: write

env:
  THEOS: ''
  PKG_VERSION: ''
  XCODE_VERSION: '15.4'

jobs:
  build:
    name: Build and upload package
    runs-on: macos-latest

    steps:
      - name: Install Homebrew dependencies
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install dpkg make libplist openssl@3 ldid-procursus
          echo "/usr/local/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Checkout roothide/theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos
          submodules: recursive

      - name: Add THEOS environment variables
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Checkout theos/sdks
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          ref: master
          path: ${{ env.THEOS }}/sdks

      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: TrollSpeed
          submodules: recursive

      - name: Setup build environment
        run: |
          echo "Available SDKs: $(find $THEOS/sdks -name "*.sdk" -maxdepth 1 -print)"
          echo "FINALPACKAGE=1" >> $GITHUB_ENV
          cd $GITHUB_WORKSPACE/TrollSpeed
          echo "PKG_VERSION=$(./get-version.sh)" >> $GITHUB_ENV

      - name: Build package
        run: |
          cd $GITHUB_WORKSPACE/TrollSpeed
          ./gen-control.sh
          ./build.sh
          THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 gmake clean package
          THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 gmake clean package
          FINALPACKAGE=1 gmake clean package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TrollSpeed_${{ env.PKG_VERSION }}_Modified
          path: |
            TrollSpeed/packages/TrollSpeed_*.tipa
            TrollSpeed/packages/TrollSpeed+AppIntents16_*.tipa
            TrollSpeed/packages/ch.xxtou.hudapp.jb_*.deb

      # 全新配置的自动发布 Release 步骤
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Modified-v${{ env.PKG_VERSION }}.b${{ github.run_number }}
          name: TrollSpeed 专属美化版 (Build ${{ github.run_number }})
          body: "包含全新 iOS 原生 Inset Grouped 风格的主页，以及全中文汉化设置选项。"
          draft: false
          prerelease: false
          files: |
            TrollSpeed/packages/TrollSpeed_*.tipa
            TrollSpeed/packages/TrollSpeed+AppIntents16_*.tipa
            TrollSpeed/packages/ch.xxtou.hudapp.jb_*.deb